name: Daily AI Radar

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Issue date YYYY-MM-DD (default: today UTC)"
        required: false
        default: ""
      lookback_hours:
        description: "How many hours of RSS history to consider"
        required: false
        default: "36"
      max_lookback_hours:
        description: "Hard cap when auto-extending lookback to fill sparse categories"
        required: false
        default: "168"
      model:
        description: "Gemini model ID"
        required: false
        default: "gemini-2.5-flash"

permissions:
  contents: write

concurrency:
  group: daily-ai-radar
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest

      - name: Generate newsletter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_DATE: ${{ inputs.date || '' }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '36' }}
          MAX_LOOKBACK_HOURS: ${{ inputs.max_lookback_hours || '168' }}
          GEMINI_MODEL: ${{ inputs.model || 'gemini-2.5-flash' }}
        run: |
          if [ -z "$ISSUE_DATE" ]; then
            ISSUE_DATE="$(date -u +'%Y-%m-%d')"
          fi
          python -m daily_ai_radar \
            --date "$ISSUE_DATE" \
            --lookback-hours "$LOOKBACK_HOURS" \
            --max-lookback-hours "$MAX_LOOKBACK_HOURS" \
            --model "$GEMINI_MODEL"

      - name: Commit newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit."
          else
            ISSUE_DATE="${{ inputs.date }}"
            if [ -z "$ISSUE_DATE" ]; then
              ISSUE_DATE="$(date -u +'%Y-%m-%d')"
            fi
            git commit -m "Add daily AI radar for $ISSUE_DATE"
            git push
          fi
